name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# pull_request_target runs with elevated permissions on PRs from forks.
# Keep the surface minimal: only what the CLA action actually needs.
permissions:
  contents: write       # update .cla-signatures.json
  pull-requests: write  # post the sign-CLA comment + the all-signed reply
  statuses: write       # set the CLA check status on the PR

jobs:
  cla:
    if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        # SHA pinned to v2.6.1 — bump in a single intentional commit when the
        # action publishes a new release; never use floating tags here because
        # this workflow runs with elevated pull_request_target permissions.
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: .cla-signatures.json
          path-to-document: https://github.com/chipzen-ai/chipzen-sdk/blob/main/.github/CLA.md
          branch: main
          allowlist: dependabot[bot]
          # `remote-organization-name` / `remote-repository-name` were
          # dropped (issue #16, option B): they switch the action to a
          # cross-repo write path that needs a Personal Access Token.
          # Signatures live in this repo, so the in-repo path with the
          # default GITHUB_TOKEN is sufficient. The `permissions:`
          # block above already grants `contents: write` and
          # `pull-requests: write`.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA. Thank you!"
