name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python-starter:
    name: Python starter (lint + smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starters/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Import smoke
        run: python -c "import importlib, ast, pathlib; [ast.parse(p.read_text()) for p in pathlib.Path('.').glob('*.py')]"

  javascript-starter:
    name: JavaScript starter (lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/javascript/starters/javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax check
        run: node --check bot.js

  rust-sdk:
    # Renamed from `rust-starter` since the legacy starters/rust/ is
    # now a one-page redirect README. CI now exercises the actual
    # workspace at packages/rust which contains chipzen-bot (the SDK
    # library) and chipzen-sdk (the CLI). The IP-protected starter at
    # packages/rust/starters/rust/ is intentionally NOT in the
    # workspace (so users can copy it standalone) and gets covered by
    # CI once chipzen-bot is published to crates.io.
    name: Rust SDK (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt --no-self-update
      - name: Cargo fmt check
        run: cargo fmt --all --check
      - name: Cargo check
        run: cargo check --workspace --all-targets --quiet
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cargo test
        run: cargo test --workspace --quiet

  reference-bot:
    name: Reference bot (lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/reference-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
