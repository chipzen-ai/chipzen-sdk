name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python-sdk:
    # Renamed from `python-starter` (issue #17). The legacy
    # starters/python/ is now a one-page redirect README, so the
    # previous job's `ruff check .` ran against an empty directory
    # and passed vacuously. This job exercises the actual SDK
    # package at packages/python/.
    name: Python SDK (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type-check
        # Static type-check before tests run — catches type errors
        # without needing a full test cycle. The SDK is fully typed
        # (the `Typing :: Typed` classifier in pyproject.toml is the
        # downstream-facing promise this gate keeps honest).
        run: mypy src/
      - name: Test
        run: pytest -q

  javascript-sdk:
    # Renamed from `javascript-starter` (issue #17). The previous
    # job only ran `node --check bot.js` against a single starter
    # file. This job runs the actual SDK package's typecheck +
    # build + full vitest suite against packages/javascript/.
    name: JavaScript SDK (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/javascript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: packages/javascript/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm test

  rust-sdk:
    # Renamed from `rust-starter` since the legacy starters/rust/ is
    # now a one-page redirect README. CI now exercises the actual
    # workspace at packages/rust which contains chipzen-bot (the SDK
    # library) and chipzen-sdk (the CLI). The IP-protected starter at
    # packages/rust/starters/rust/ is intentionally NOT in the
    # workspace (so users can copy it standalone) and gets covered by
    # CI once chipzen-bot is published to crates.io.
    name: Rust SDK (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt --no-self-update
      - name: Cargo fmt check
        run: cargo fmt --all --check
      - name: Cargo check
        run: cargo check --workspace --all-targets --quiet
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cargo test
        run: cargo test --workspace --quiet

  reference-bot:
    name: Reference bot (lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/reference-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
