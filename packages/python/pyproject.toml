[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "chipzen-bot"
version = "0.2.0"
description = "Build, test, and deploy poker bots for the Chipzen AI competition platform"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
authors = [
    { name = "Chipzen, Inc.", email = "support@chipzen.ai" },
]
keywords = ["poker", "bot", "ai", "competition", "chipzen", "sdk"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Games/Entertainment",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "websockets>=12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.5.0",
    "hypothesis>=6.100.0",
]

[project.urls]
Homepage = "https://chipzen.ai"
Documentation = "https://chipzen.ai/docs/sdk"
Repository = "https://github.com/chipzen-ai/chipzen-sdk"
Issues = "https://github.com/chipzen-ai/chipzen-sdk/issues"
Changelog = "https://github.com/chipzen-ai/chipzen-sdk/blob/main/packages/python/CHANGELOG.md"

[project.scripts]
chipzen-sdk = "chipzen.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/chipzen"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = ["E741", "N806"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "E402", "F841", "F401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
